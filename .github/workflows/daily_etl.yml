name: Daily Data Pipeline

on:
  schedule:
    - cron: '0 12 * * *' # Roda todo dia ao meio-dia UTC
  workflow_dispatch: # Permite rodar manualmente pelo botão no GitHub

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install pandas requests sqlalchemy

      - name: Run ETL
        run: python main.py

      - name: Commit and Push Database
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add database/warehouse.db
          git commit -m "Update warehouse data [skip ci]" || echo "No changes to commit"
          git push